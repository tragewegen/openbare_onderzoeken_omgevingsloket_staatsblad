    window.onload = () => {
        const content = document.getElementById('content-area');
        content.innerHTML = "";
        resultLayer.clearLayers();

        // 1. Dossiers
        let omgevingsHtml = '<div class="section-title">Omgevingsonderzoeken</div>';
        if (typeof DATA_DOSSIERS !== 'undefined' && DATA_DOSSIERS && DATA_DOSSIERS.features) {
            const leafletGeo = L.geoJSON(DATA_DOSSIERS, {
                style: { color: '#3498db', weight: 2, fillOpacity: 0.3 },
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    const nr = p.projectnummer || p.PROJECTNUMMER || 'N/A';
                    const type = p.omschrijving_projecttype || p.OMSCHRIJVING_PROJECTTYPE || 'Geen info';
                    const naam = p.projectNaam || p.PROJECTNAAM || 'Geen naam';
                    const omschrijving = p.handeling_omschrijving || p.HANDELING_OMSCHRIJVING || '';
                    const url = p.loket_url || p.LOKET_URL || '#';

                    l.bindPopup(`
                        <div style="font-size: 13px; line-height: 1.4;">
                            <strong>Project: ${nr}</strong><br>
                            <b>Naam:</b> ${naam}<br>
                            ${omschrijving ? `<b>Handeling:</b> ${omschrijving}<br>` : ''}
                            <hr style="margin: 8px 0;">
                            <a href="${url}" target="_blank" style="color: #3498db; font-weight: bold; text-decoration: none;">Open Omgevingsloket -></a>
                        </div>
                    `);
                    
                    omgevingsHtml += `
                        <div class="card card-omgeving" onclick="zoomToFeature('${nr}')">
                            <h4>Project ${nr}</h4>
                            <p><b>Type:</b> ${type}</p>
                            <p><b>Naam:</b> ${naam}</p>
                            ${omschrijving ? `<p class="omschrijving">${omschrijving}</p>` : ''}
                            <a href="${url}" target="_blank" class="btn-link" onclick="event.stopPropagation();">Bekijk in Omgevingsloket -></a>
                        </div>`;
                }
            }).addTo(resultLayer);
            if (DATA_DOSSIERS.features.length > 0) map.fitBounds(leafletGeo.getBounds());
            window.currentLayers = leafletGeo;
        }

        // 2. Wegen
        if (typeof DATA_WEGEN !== 'undefined' && DATA_WEGEN && DATA_WEGEN.features) {
            L.geoJSON(DATA_WEGEN, { 
                style: { color: '#e74c3c', weight: 3, dashArray: '5, 5' },
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    let rawJur = p.TW_JUR_STATUUT || p.tw_jur_statuut;
                    let jurInfo = (rawJur == 2 || rawJur == "2") ? "weg met rooilijn" : "feitelijke weg";
                    let abwVal = p.TW_ABW || p.tw_abw || "Geen info";

                    l.bindPopup(`
                        <div style="font-size: 13px;">
                            <b>Wegsegment</b><br>
                            <b>weginfo:</b> ${jurInfo}<br>
                            <b>Atlas der Buurtwegen:</b> ${abwVal}
                        </div>
                    `);
                }
            }).addTo(resultLayer);
        }

        // 3. Staatsblad
        let staatsbladHtml = '<div class="section-title">Belgisch Staatsblad</div>';
        if (typeof DATA_STAATSBLAD !== 'undefined' && DATA_STAATSBLAD && DATA_STAATSBLAD.length > 0) {
            DATA_STAATSBLAD.forEach(item => {
                staatsbladHtml += `
                    <div class="card card-staatsblad">
                        <h4>${item.date}</h4>
                        <p>${item.title}</p>
                        ${item.onderwerp ? `<p><small><b>Onderwerp:</b> ${item.onderwerp}</small></p>` : ''}
                        <a href="${item.link}" target="_blank" class="btn-link">Bekijk in Staatsblad -></a>
                    </div>`;
            });
        } else {
            staatsbladHtml += "<p>Geen publicaties gevonden.</p>";
        }
        content.innerHTML = omgevingsHtml + staatsbladHtml;
    };

    function zoomToFeature(id) {
        if (!window.currentLayers) return;
        window.currentLayers.eachLayer(layer => {
            const p = layer.feature.properties;
            if ((p.projectnummer || p.PROJECTNUMMER) == id) {
                map.setView(layer.getBounds().getCenter(), 17);
                layer.openPopup();
            }
        });
    }
</script>
