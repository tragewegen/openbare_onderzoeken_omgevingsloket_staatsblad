    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background-color: #f0f0f0; }

        #sidebar-header { padding: 0; background: #2c3e50; color: white; }
        #sidebar-header h3 { padding: 20px 20px 5px 20px; margin: 0; }
        
        .btn-follow-container { padding: 0 20px 15px 20px; background: #2c3e50; }
        .btn-follow { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.85rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .card-staatsblad { border-left-color: #e67e22; }

        .card .omschrijving { font-style: italic; color: #777; margin-top: 5px; border-top: 1px solid #eee; padding-top: 5px; }
        .btn-link { display: inline-block; margin-top: 8px; color: #3498db; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        #map { flex-grow: 1; height: 100%; }
    </style>
</head>

            <button class="btn-follow" onclick="followThisPage()">

    <div id="content-area"></div>
</div>
<div id="map"></div>

.pl?language=nl&sum_date=2026-05-19&pd_search=2010-06-08&numac_search=2010724103&page=1&lg_txt=N&caller=list&2010724103=17&view_numac=&text1=Rotselaar&text2=rooilijn&choix1=en&choix2=en", "onderwerp": "rooilijn", "numac": "2010724103"}, {"date": "08 juni 2010", "title": "Rooilijnplan Regastraat (deel) Het College van Burgemeester en Schepenen van de gemeente Rotselaar brengt ter kennis", "link": "https://www.ejustice.just.fgov.be/cgi/article.pl?language=nl&sum_date=2026-05-19&pd_search=2010-06-08&numac_search=2010724102&page=1&lg_txt=N&caller=list&2010724102=18&view_numac=&text1=Rotselaar&text2=rooilijn&choix1=en&choix2=en", "onderwerp": "rooilijn", "numac": "2010724102"}, {"date": "08 juni 2010", "title": "Decreet van 8 mei 2009  houdende organisatie van de ruimtelijke ordening Gemeente Rotselaar Rooilijnplan Beukenlaan", "link": "https://www.ejustice.just.fgov.be/cgi/article.pl?language=nl&sum_date=2026-05-19&pd_search=2010-06-08&numac_search=2010724101&page=1&lg_txt=N&caller=list&2010724101=19&view_numac=&text1=Rotselaar&text2=rooilijn&choix1=en&choix2=en", "onderwerp": "rooilijn", "numac": "2010724101"}, {"date": "14 mei 2010", "title": "Ruimtelijke Ordening", "link": "https://www.ejustice.just.fgov.be/cgi/article.pl?language=nl&sum_date=2026-05-19&pd_search=2010-05-14&numac_search=2010202579&page=1&lg_txt=N&caller=list&2010202579=20&view_numac=&text1=Rotselaar&text2=rooilijn&choix1=en&choix2=en", "onderwerp": "rooilijn", "numac": "2010202579"}, {"date": "06 maart 2003", "title": "Departement Leefmilieu en Infrastructuur Ruimtelijke ordening  BEERNEM. - Bij besluit van 20 februari 2003 van de Vlaamse minister van Financi\u00ebn en Begroting, Innovatie", "link": "https://www.ejustice.just.fgov.be/cgi/article.pl?language=nl&sum_date=2026-05-19&pd_search=2003-03-06&numac_search=2003200282&page=1&lg_txt=N&caller=list&2003200282=25&view_numac=&text1=Rotselaar&text2=rooilijn&choix1=en&choix2=en", "onderwerp": "rooilijn", "numac": "2003200282"}, {"date": "19 november 1     window.onload = () => {
        const content = document.getElementById('content-area');
        content.innerHTML = "";
        resultLayer.clearLayers();

        // 1. Dossiers
        let omgevingsHtml = '<div class="section-title">Omgevingsonderzoeken</div>';
        if (typeof DATA_DOSSIERS !== 'undefined' && DATA_DOSSIERS && DATA_DOSSIERS.features) {
            const leafletGeo = L.geoJSON(DATA_DOSSIERS, {
                style: { color: '#3498db', weight: 2, fillOpacity: 0.3 },
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    const nr = p.projectnummer || p.PROJECTNUMMER || 'N/A';
                    const type = p.omschrijving_projecttype || p.OMSCHRIJVING_PROJECTTYPE || 'Geen info';
                    const naam = p.projectNaam || p.PROJECTNAAM || 'Geen naam';
                    const omschrijving = p.handeling_omschrijving || p.HANDELING_OMSCHRIJVING || '';
                    const url = p.loket_url || p.LOKET_URL || '#';

                    l.bindPopup(`
                        <div style="font-size: 13px; line-height: 1.4;">
                            <strong>Project: ${nr}</strong><br>
                            <b>Naam:</b> ${naam}<br>
                            ${omschrijving ? `<b>Handeling:</b> ${omschrijving}<br>` : ''}
                            <hr style="margin: 8px 0;">
                            <a href="${url}" target="_blank" style="color: #3498db; font-weight: bold; text-decoration: none;">Open Omgevingsloket -></a>
                        </div>
                    `);
                    
                    omgevingsHtml += `
                        <div class="card card-omgeving" onclick="zoomToFeature('${nr}')">
                            <h4>Project ${nr}</h4>
                            <p><b>Type:</b> ${type}</p>
                            <p><b>Naam:</b> ${naam}</p>
                            ${omschrijving ? `<p class="omschrijving">${omschrijving}</p>` : ''}
                            <a href="${url}" target="_blank" class="btn-link" onclick="event.stopPropagation();">Bekijk in Omgevingsloket -></a>
                        </div>`;
                }
            }).addTo(resultLayer);
            if (DATA_DOSSIERS.features.length > 0) map.fitBounds(leafletGeo.getBounds());
            window.currentLayers = leafletGeo;
        }

        // 2. Wegen
        if (typeof DATA_WEGEN !== 'undefined' && DATA_WEGEN && DATA_WEGEN.features) {
            L.geoJSON(DATA_WEGEN, { 
                style: { color: '#e74c3c', weight: 3, dashArray: '5, 5' },
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    let rawJur = p.TW_JUR_STATUUT || p.tw_jur_statuut;
                    let jurInfo = (rawJur == 2 || rawJur == "2") ? "weg met rooilijn" : "feitelijke weg";
                    let abwVal = p.TW_ABW || p.tw_abw || "Geen info";

                    l.bindPopup(`
                        <div style="font-size: 13px;">
                            <b>Wegsegment</b><br>
                            <b>weginfo:</b> ${jurInfo}<br>
                            <b>Atlas der Buurtwegen:</b> ${abwVal}
                        </div>
                    `);
                }
            }).addTo(resultLayer);
        }

        // 3. Staatsblad
        let staatsbladHtml = '<div class="section-title">Belgisch Staatsblad</div>';
        if (typeof DATA_STAATSBLAD !== 'undefined' && DATA_STAATSBLAD && DATA_STAATSBLAD.length > 0) {
            DATA_STAATSBLAD.forEach(item => {
                staatsbladHtml += `
                    <div class="card card-staatsblad">
                        <h4>${item.date}</h4>
                        <p>${item.title}</p>
                        ${item.onderwerp ? `<p><small><b>Onderwerp:</b> ${item.onderwerp}</small></p>` : ''}
                        <a href="${item.link}" target="_blank" class="btn-link">Bekijk in Staatsblad -></a>
                    </div>`;
            });
        } else {
            staatsbladHtml += "<p>Geen publicaties gevonden.</p>";
        }
        content.innerHTML = omgevingsHtml + staatsbladHtml;
    };

    function zoomToFeature(id) {
        if (!window.currentLayers) return;
        window.currentLayers.eachLayer(layer => {
            const p = layer.feature.properties;
            if ((p.projectnummer || p.PROJECTNUMMER) == id) {
                map.setView(layer.getBounds().getCenter(), 17);
                layer.openPopup();
            }
        });
    }
</script>
</body>
</html>
